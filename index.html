<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ALBS" />
  <title>All Lads Bible Study</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a1a2e; }
    body { font-family: 'Crimson Pro', Georgia, serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    #root { height: 100%; }
    input, button, textarea { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Supabase ──────────────────────────────────────────────────────────────
    const SUPABASE_URL = "https://wywawxwszpsrocffapaf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5d2F3eHdzenBzcm9jZmZhcGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MzUzNzQsImV4cCI6MjA4ODAxMTM3NH0.Dw0nQC1xYFSv334_XIP2fvYd0TKKMj_hYLHzjHlnnFk";

    async function sbFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=minimal",
          ...options.headers,
        },
      });
      const text = await res.text();
      if (!res.ok) throw new Error(text);
      return text ? JSON.parse(text) : null;
    }

    // ── Local storage helpers (replaces window.storage) ───────────────────────
    const store = {
      get: (key) => {
        try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch { return null; }
      },
      set: (key, value) => {
        try { localStorage.setItem(key, value); } catch {}
      },
    };

    // ── Bible data ─────────────────────────────────────────────────────────────
    const BIBLE_DATA = {
      "Genesis": { chapters: 50 }, "Exodus": { chapters: 40 }, "Leviticus": { chapters: 27 },
      "Numbers": { chapters: 36 }, "Deuteronomy": { chapters: 34 }, "Joshua": { chapters: 24 },
      "Judges": { chapters: 21 }, "Ruth": { chapters: 4 }, "1 Samuel": { chapters: 31 },
      "2 Samuel": { chapters: 24 }, "1 Kings": { chapters: 22 }, "2 Kings": { chapters: 25 },
      "1 Chronicles": { chapters: 29 }, "2 Chronicles": { chapters: 36 }, "Ezra": { chapters: 10 },
      "Nehemiah": { chapters: 13 }, "Esther": { chapters: 10 }, "Job": { chapters: 42 },
      "Psalms": { chapters: 150 }, "Proverbs": { chapters: 31 }, "Ecclesiastes": { chapters: 12 },
      "Song of Solomon": { chapters: 8 }, "Isaiah": { chapters: 66 }, "Jeremiah": { chapters: 52 },
      "Lamentations": { chapters: 5 }, "Ezekiel": { chapters: 48 }, "Daniel": { chapters: 12 },
      "Hosea": { chapters: 14 }, "Joel": { chapters: 3 }, "Amos": { chapters: 9 },
      "Obadiah": { chapters: 1 }, "Jonah": { chapters: 4 }, "Micah": { chapters: 7 },
      "Nahum": { chapters: 3 }, "Habakkuk": { chapters: 3 }, "Zephaniah": { chapters: 3 },
      "Haggai": { chapters: 2 }, "Zechariah": { chapters: 14 }, "Malachi": { chapters: 4 },
      "Matthew": { chapters: 28 }, "Mark": { chapters: 16 }, "Luke": { chapters: 24 },
      "John": { chapters: 21 }, "Acts": { chapters: 28 }, "Romans": { chapters: 16 },
      "1 Corinthians": { chapters: 16 }, "2 Corinthians": { chapters: 13 }, "Galatians": { chapters: 6 },
      "Ephesians": { chapters: 6 }, "Philippians": { chapters: 4 }, "Colossians": { chapters: 4 },
      "1 Thessalonians": { chapters: 5 }, "2 Thessalonians": { chapters: 3 }, "1 Timothy": { chapters: 6 },
      "2 Timothy": { chapters: 4 }, "Titus": { chapters: 3 }, "Philemon": { chapters: 1 },
      "Hebrews": { chapters: 13 }, "James": { chapters: 5 }, "1 Peter": { chapters: 5 },
      "2 Peter": { chapters: 3 }, "1 John": { chapters: 5 }, "2 John": { chapters: 1 },
      "3 John": { chapters: 1 }, "Jude": { chapters: 1 }, "Revelation": { chapters: 22 },
    };

    const OT_BOOKS = Object.keys(BIBLE_DATA).slice(0, 39);
    const NT_BOOKS = Object.keys(BIBLE_DATA).slice(39);

    const TRANSLATIONS = [
      { id: "NIV",  label: "New International Version",  short: "NIV"  },
      { id: "KJV",  label: "King James Version",          short: "KJV"  },
      { id: "ESV",  label: "English Standard Version",    short: "ESV"  },
      { id: "NLT",  label: "New Living Translation",      short: "NLT"  },
      { id: "NKJV", label: "New King James Version",      short: "NKJV" },
      { id: "NASB", label: "New American Standard Bible", short: "NASB" },
      { id: "CSB",  label: "Christian Standard Bible",    short: "CSB"  },
      { id: "MSG",  label: "The Message (paraphrase)",    short: "MSG"  },
    ];

    function getWeeklyChapter() {
      const epoch = new Date("2024-01-07");
      const weekNum = Math.floor((Date.now() - epoch) / (7 * 24 * 60 * 60 * 1000));
      const all = [];
      for (const [book, d] of Object.entries(BIBLE_DATA))
        for (let c = 1; c <= d.chapters; c++) all.push({ book, chapter: c });
      return all[((weekNum % all.length) + all.length) % all.length];
    }

    const avatarColors = ["#5b6ea8","#7b8eae","#6e7fba","#8e7bae","#7b9e8e","#9e8b7b","#6b8eae","#ae8b9e","#7b9ea8","#9e9b7b"];
    function getAvatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
      return avatarColors[Math.abs(h) % avatarColors.length];
    }

    function Avatar({ name, size = 36 }) {
      const initials = name.split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();
      return (
        <div style={{ width: size, height: size, borderRadius: "50%", background: getAvatarColor(name), display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.38, fontWeight: 700, color: "#f0f0ff", flexShrink: 0, letterSpacing: "0.02em" }}>{initials}</div>
      );
    }

    function formatTime(ts) {
      const diff = Date.now() - ts;
      if (diff < 60000) return "just now";
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      return new Date(ts).toLocaleDateString("en-AU", { day: "numeric", month: "short" });
    }

    // ── Main App ───────────────────────────────────────────────────────────────
    function BibleApp() {
      const [screen, setScreen] = useState("splash");
      const [userName, setUserName] = useState("");
      const [nameInput, setNameInput] = useState("");
      const [messages, setMessages] = useState([]);
      const [msgInput, setMsgInput] = useState("");
      const [selectedBook, setSelectedBook] = useState(null);
      const [selectedChapter, setSelectedChapter] = useState(1);
      const [activeTab, setActiveTab] = useState("OT");
      const [verses, setVerses] = useState([]);
      const [versesLoading, setVersesLoading] = useState(false);
      const [versesError, setVersesError] = useState(false);
      const [translation, setTranslation] = useState("NIV");
      const [showTransPicker, setShowTransPicker] = useState(false);
      const chatEndRef = useRef(null);
      const weekly = getWeeklyChapter();

      // ── Fetch chapter via Claude API ────────────────────────────────────────
      async function fetchChapter(book, chapter, trans) {
        const t = trans || translation;
        setVersesLoading(true);
        setVersesError(false);
        setVerses([]);

        const cacheKey = `ch:${t}:${book}:${chapter}`;
        const cached = store.get(cacheKey);
        if (cached) {
          try {
            const parsed = JSON.parse(cached.value);
            if (Array.isArray(parsed) && parsed.length > 0) {
              setVerses(parsed);
              setVersesLoading(false);
              return;
            }
          } catch {}
        }

        const transLabel = TRANSLATIONS.find(x => x.id === t)?.label || t;
        const attempts = [
          { label: transLabel, id: t },
          { label: transLabel, id: t },
          { label: "King James Version", id: "KJV" },
        ];

        for (let i = 0; i < attempts.length; i++) {
          const { label: aLabel, id: aId } = attempts[i];
          try {
            const res = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 4000,
                system: `You output Bible verses as JSON. You must ONLY output a JSON array. Nothing else. No explanation. No markdown. No code blocks. Just the array starting with [ and ending with ].`,
                messages: [
                  { role: "user", content: `Output ${book} chapter ${chapter} from the ${aLabel} as a JSON array. Every verse. Format: [{"verse":1,"text":"..."},...]. Begin with [ immediately.` },
                  { role: "assistant", content: "[" }
                ]
              })
            });
            const data = await res.json();
            const raw = "[" + (data.content?.[0]?.text || "");
            const match = raw.match(/\[[\s\S]*\]/);
            if (!match) throw new Error("no array");
            const parsed = JSON.parse(match[0]);
            if (!Array.isArray(parsed) || parsed.length === 0) throw new Error("empty");
            const result = aId !== t ? parsed.map((v, idx) => idx === 0 ? { ...v, _fallback: true } : v) : parsed;
            setVerses(result);
            store.set(cacheKey, JSON.stringify(result));
            setVersesLoading(false);
            return;
          } catch {}
        }
        setVersesError(true);
        setVersesLoading(false);
      }

      // ── Startup ─────────────────────────────────────────────────────────────
      useEffect(() => {
        const savedName = store.get("userName");
        const savedTrans = store.get("userTranslation");
        if (savedTrans) setTranslation(savedTrans.value);
        if (savedName?.value) { setUserName(savedName.value); setScreen("home"); }
        else setScreen("login");

        const fetchMsgs = () =>
          sbFetch("messages?select=*&order=timestamp.asc")
            .then(rows => {
              if (rows) setMessages(rows.map(r => ({ id: r.id, user: r.user_name, text: r.text, chapter: r.chapter, timestamp: r.timestamp })));
            }).catch(() => {});

        fetchMsgs();
        const poll = setInterval(fetchMsgs, 6000);
        return () => clearInterval(poll);
      }, []);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, screen]);

      useEffect(() => {
        if (screen === "read") {
          const book = selectedBook || weekly.book;
          const chapter = selectedBook ? selectedChapter : weekly.chapter;
          fetchChapter(book, chapter, translation);
        }
      }, [screen, selectedBook, selectedChapter]);

      function changeTranslation(t) {
        setTranslation(t);
        setShowTransPicker(false);
        store.set("userTranslation", t);
        if (screen === "read") {
          const book = selectedBook || weekly.book;
          const chapter = selectedBook ? selectedChapter : weekly.chapter;
          fetchChapter(book, chapter, t);
        }
      }

      function handleLogin() {
        const name = nameInput.trim();
        if (!name) return;
        setUserName(name);
        setScreen("home");
        store.set("userName", name);
        sbFetch("members", {
          method: "POST",
          headers: { "Prefer": "resolution=ignore-duplicates,return=minimal" },
          body: JSON.stringify({ name }),
        }).catch(() => {});
      }

      function sendMessage() {
        const text = msgInput.trim();
        if (!text) return;
        const timestamp = Date.now();
        const chapter = `${weekly.book} ${weekly.chapter}`;
        setMessages(prev => [...prev, { id: timestamp, user: userName, text, chapter, timestamp }]);
        setMsgInput("");
        sbFetch("messages", {
          method: "POST",
          body: JSON.stringify({ user_name: userName, text, chapter, timestamp }),
        }).catch(() => {});
      }

      // ── Styles ───────────────────────────────────────────────────────────────
      const APP = { minHeight: "100vh", background: "#1a1a2e", color: "#e8e8f0", fontFamily: "'Crimson Pro', Georgia, serif", display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto" };
      const HDR = { background: "linear-gradient(180deg,#252538,#1a1a2e)", borderBottom: "1px solid #2e2e4a", padding: "14px 20px 12px", paddingTop: "calc(14px + env(safe-area-inset-top, 0px))", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 20 };
      const LOGO = { fontSize: 17, fontWeight: 600, color: "#c9a96e", letterSpacing: "0.06em", textTransform: "uppercase" };
      const NAV_WRAP = { display: "flex", background: "#13131f", borderTop: "1px solid #2e2e4a", position: "sticky", bottom: 0, zIndex: 20, paddingBottom: "env(safe-area-inset-bottom, 0px)" };
      const CONTENT = { flex: 1, overflowY: "auto", paddingBottom: 80 };
      const TRANS_BTN = { background: "rgba(201,169,110,0.12)", border: "1px solid #3a3a5c", borderRadius: 20, padding: "4px 10px", color: "#c9a96e", fontSize: 12, cursor: "pointer", letterSpacing: "0.05em" };

      const navBtnStyle = (active) => ({ flex: 1, padding: "11px 4px 9px", background: "none", border: "none", color: active ? "#c9a96e" : "#58587a", fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 });

      const weeklyMessages = messages.filter(m => m.chapter === `${weekly.book} ${weekly.chapter}`);

      const NavBar = ({ cur }) => (
        <nav style={NAV_WRAP}>
          {[
            { id: "home",   icon: "⌂", label: "Home" },
            { id: "read",   icon: "✦", label: "This Week" },
            { id: "chat",   icon: "◈", label: weeklyMessages.length > 0 ? `Chat (${weeklyMessages.length})` : "Chat" },
            { id: "browse", icon: "◎", label: "Browse" },
          ].map(({ id, icon, label }) => (
            <button key={id} style={navBtnStyle(cur === id)} onClick={() => { if (id !== "read") setSelectedBook(null); setScreen(id); }}>
              <span style={{ fontSize: 18 }}>{icon}</span><span>{label}</span>
            </button>
          ))}
        </nav>
      );

      const TransPicker = () => (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 50, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={() => setShowTransPicker(false)}>
          <div style={{ background: "#1e1e30", border: "1px solid #2e2e4a", borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, paddingBottom: 32 }} onClick={e => e.stopPropagation()}>
            <div style={{ textAlign: "center", padding: "16px 0 12px" }}>
              <div style={{ width: 36, height: 4, background: "#2e2e4a", borderRadius: 2, margin: "0 auto 14px" }} />
              <div style={{ color: "#7878a0", fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase" }}>Choose Translation</div>
            </div>
            {TRANSLATIONS.map(t => (
              <button key={t.id} onClick={() => changeTranslation(t.id)} style={{ width: "100%", background: translation === t.id ? "rgba(201,169,110,0.1)" : "none", border: "none", borderLeft: `3px solid ${translation === t.id ? "#c9a96e" : "transparent"}`, padding: "13px 24px", color: translation === t.id ? "#c9a96e" : "#b8b8d8", fontSize: 16, cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span>{t.label}</span>
                <span style={{ fontSize: 12, color: translation === t.id ? "#c9a96e" : "#46466a", letterSpacing: "0.08em" }}>{t.short}</span>
              </button>
            ))}
          </div>
        </div>
      );

      // ── SPLASH ──────────────────────────────────────────────────────────────
      if (screen === "splash") return (
        <div style={{ minHeight: "100vh", background: "#1a1a2e", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontSize: 40, color: "#c9a96e", marginBottom: 12 }}>✝</div>
          <div style={{ color: "#58587a", fontSize: 16, fontStyle: "italic" }}>All Lads Bible Study</div>
        </div>
      );

      // ── LOGIN ───────────────────────────────────────────────────────────────
      if (screen === "login") return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#1a1a2e,#0d0d1a 50%,#1a1a2e)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
          <div style={{ fontSize: 48, marginBottom: 8, color: "#c9a96e", opacity: 0.8 }}>✝</div>
          <h1 style={{ fontSize: 27, fontWeight: 400, color: "#e8e8f0", margin: "0 0 6px", letterSpacing: "0.1em", textTransform: "uppercase", textAlign: "center" }}>All Lads Bible Study</h1>
          <p style={{ color: "#7878a0", fontSize: 15, margin: "0 0 40px", fontStyle: "italic" }}>A community Bible study</p>
          <div style={{ width: "100%", maxWidth: 340, background: "rgba(255,255,255,0.04)", border: "1px solid #2e2e4a", borderRadius: 16, padding: 28 }}>
            <p style={{ color: "#9898b8", fontSize: 13, letterSpacing: "0.06em", textTransform: "uppercase", margin: "0 0 8px" }}>Your Name</p>
            <input value={nameInput} onChange={e => setNameInput(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="Enter your name..." autoFocus
              style={{ width: "100%", background: "rgba(255,255,255,0.06)", border: "1px solid #3a3a5c", borderRadius: 10, padding: "12px 16px", color: "#e8e8f0", fontSize: 18, outline: "none", marginBottom: 20 }} />
            <button onClick={handleLogin} style={{ width: "100%", background: "linear-gradient(135deg,#c9a96e,#a8854a)", border: "none", borderRadius: 10, padding: 13, color: "#f0f0ff", fontSize: 16, fontWeight: 600, cursor: "pointer", letterSpacing: "0.08em", textTransform: "uppercase" }}>Enter the Study</button>
          </div>
          <p style={{ color: "#46466a", fontSize: 13, marginTop: 24, fontStyle: "italic", textAlign: "center" }}>
            "Your word is a lamp to my feet and a light to my path."<br /><span style={{ color: "#58587a" }}>— Psalm 119:105</span>
          </p>
        </div>
      );

      // ── HOME ────────────────────────────────────────────────────────────────
      if (screen === "home") return (
        <div style={APP}>
          {showTransPicker && <TransPicker />}
          <div style={HDR}>
            <div style={LOGO}>✝ All Lads</div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button style={TRANS_BTN} onClick={() => setShowTransPicker(true)}>{translation}</button>
              <Avatar name={userName} size={30} />
              <span style={{ color: "#9898b8", fontSize: 14 }}>{userName}</span>
            </div>
          </div>
          <div style={CONTENT}>
            <div style={{ background: "linear-gradient(180deg,#252538,#1a1a2e)", padding: "28px 24px 24px", borderBottom: "1px solid #2e2e4a" }}>
              <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#7878a0", marginBottom: 8 }}>This Week's Study</div>
              <h1 style={{ fontSize: 30, fontWeight: 600, color: "#e8e8f0", margin: "0 0 2px" }}>{weekly.book}</h1>
              <div style={{ fontSize: 18, color: "#c9a96e", marginBottom: 16 }}>Chapter {weekly.chapter}</div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => { setSelectedBook(null); setScreen("read"); }} style={{ background: "linear-gradient(135deg,#c9a96e,#a8854a)", border: "none", borderRadius: 8, padding: "10px 20px", color: "#f0f0ff", fontSize: 14, fontWeight: 600, cursor: "pointer", letterSpacing: "0.05em" }}>Read Now</button>
                <button onClick={() => setScreen("chat")} style={{ background: "rgba(201,169,110,0.15)", border: "1px solid #c9a96e", borderRadius: 8, padding: "10px 20px", color: "#c9a96e", fontSize: 14, cursor: "pointer" }}>Discuss ({weeklyMessages.length})</button>
              </div>
            </div>
            <div style={{ padding: "24px 24px 0" }}>
              <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#7878a0", marginBottom: 16 }}>Recent Thoughts</div>
              {weeklyMessages.length === 0
                ? <div style={{ background: "rgba(255,255,255,0.03)", border: "1px dashed #2e2e4a", borderRadius: 12, padding: 24, textAlign: "center", color: "#46466a", fontStyle: "italic" }}>Be the first to share your thoughts on {weekly.book} {weekly.chapter}</div>
                : <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {weeklyMessages.slice(-3).reverse().map(msg => (
                      <div key={msg.id} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid #2e2e4a", borderRadius: 12, padding: "14px 16px", display: "flex", gap: 12 }}>
                        <Avatar name={msg.user} size={34} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
                            <span style={{ color: "#c9a96e", fontSize: 14, fontWeight: 600 }}>{msg.user}</span>
                            <span style={{ color: "#46466a", fontSize: 12 }}>{formatTime(msg.timestamp)}</span>
                          </div>
                          <p style={{ margin: 0, color: "#b8b8d8", fontSize: 15, lineHeight: 1.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{msg.text}</p>
                        </div>
                      </div>
                    ))}
                    {weeklyMessages.length > 3 && <button onClick={() => setScreen("chat")} style={{ background: "none", border: "none", color: "#c9a96e", fontSize: 14, cursor: "pointer", fontStyle: "italic", padding: 0, textAlign: "left" }}>View all {weeklyMessages.length} thoughts →</button>}
                  </div>
              }
            </div>
            <div style={{ padding: 24 }}>
              <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#7878a0", marginBottom: 12 }}>The Full Bible</div>
              <button onClick={() => setScreen("browse")} style={{ width: "100%", background: "rgba(255,255,255,0.03)", border: "1px solid #2e2e4a", borderRadius: 12, padding: 16, color: "#9898b8", fontSize: 15, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span>66 Books · Old & New Testament</span><span style={{ color: "#c9a96e" }}>Browse →</span>
              </button>
            </div>
          </div>
          <NavBar cur="home" />
        </div>
      );

      // ── READ ────────────────────────────────────────────────────────────────
      if (screen === "read") {
        const displayBook = selectedBook || weekly.book;
        const displayChapter = selectedBook ? selectedChapter : weekly.chapter;
        const isWeekly = displayBook === weekly.book && displayChapter === weekly.chapter;
        const transLabel = TRANSLATIONS.find(t => t.id === translation)?.label || translation;
        return (
          <div style={APP}>
            {showTransPicker && <TransPicker />}
            <div style={{ ...HDR, flexDirection: "column", alignItems: "stretch", gap: 6 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <button onClick={() => setScreen("browse")} style={{ background: "none", border: "none", color: "#c9a96e", fontSize: 22, cursor: "pointer", padding: 0 }}>←</button>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  {isWeekly && <div style={{ background: "rgba(201,169,110,0.15)", border: "1px solid #c9a96e", borderRadius: 20, padding: "3px 10px", fontSize: 10, color: "#c9a96e", letterSpacing: "0.1em", textTransform: "uppercase" }}>This Week</div>}
                  <button style={TRANS_BTN} onClick={() => setShowTransPicker(true)}>{translation}</button>
                </div>
              </div>
              <div>
                <span style={{ color: "#e8e8f0", fontSize: 18, fontWeight: 600 }}>{displayBook}</span>
                <span style={{ color: "#7878a0", fontSize: 14 }}> · Chapter {displayChapter}</span>
                <span style={{ color: "#46466a", fontSize: 12, marginLeft: 6 }}>{transLabel}</span>
              </div>
            </div>
            <div style={{ ...CONTENT, padding: "24px 24px 100px" }}>
              {versesLoading && (
                <div style={{ textAlign: "center", padding: "60px 0", color: "#58587a" }}>
                  <div style={{ fontSize: 28, marginBottom: 12 }}>✝</div>
                  <p style={{ fontStyle: "italic", fontSize: 16, margin: "0 0 4px" }}>Loading scripture...</p>
                  <p style={{ fontSize: 13, color: "#35354f", margin: 0 }}>Fetching {translation} · this takes a few seconds</p>
                </div>
              )}
              {versesError && (
                <div style={{ textAlign: "center", padding: "60px 24px" }}>
                  <div style={{ fontSize: 28, color: "#4a3a5a", marginBottom: 12 }}>⚠</div>
                  <p style={{ fontSize: 16, color: "#8b6e7a", marginBottom: 16 }}>Could not load this chapter. Please check your internet connection.</p>
                  <button onClick={() => fetchChapter(displayBook, displayChapter, translation)} style={{ background: "none", border: "1px solid #8b6e7a", borderRadius: 8, padding: "8px 20px", color: "#8b6e7a", cursor: "pointer", fontSize: 15 }}>Try Again</button>
                </div>
              )}
              {!versesLoading && !versesError && verses.length > 0 && verses[0]?._fallback && (
                <div style={{ background: "rgba(201,169,110,0.08)", border: "1px solid rgba(201,169,110,0.25)", borderRadius: 10, padding: "10px 14px", marginBottom: 20, fontSize: 13, color: "#9898b8", fontStyle: "italic" }}>
                  ℹ {translation} unavailable for this chapter — showing KJV instead.
                </div>
              )}
              {!versesLoading && !versesError && verses.map(v => (
                <div key={v.verse} style={{ display: "flex", gap: 16, marginBottom: 18 }}>
                  <span style={{ color: "#c9a96e", fontSize: 11, fontWeight: 700, minWidth: 22, paddingTop: 5, letterSpacing: "0.05em", flexShrink: 0 }}>{v.verse}</span>
                  <p style={{ margin: 0, color: "#e8e8f0", fontSize: 18, lineHeight: 1.85, fontWeight: 300 }}>{v.text}</p>
                </div>
              ))}
              {isWeekly && !versesLoading && !versesError && verses.length > 0 && (
                <div style={{ marginTop: 32, padding: 20, background: "rgba(201,169,110,0.08)", border: "1px solid rgba(201,169,110,0.3)", borderRadius: 12, textAlign: "center" }}>
                  <p style={{ margin: "0 0 12px", color: "#9898b8", fontStyle: "italic", fontSize: 15 }}>Share your thoughts on this chapter</p>
                  <button onClick={() => setScreen("chat")} style={{ background: "linear-gradient(135deg,#c9a96e,#a8854a)", border: "none", borderRadius: 8, padding: "10px 24px", color: "#f0f0ff", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Join the Discussion</button>
                </div>
              )}
            </div>
            <NavBar cur="read" />
          </div>
        );
      }

      // ── CHAT ────────────────────────────────────────────────────────────────
      if (screen === "chat") {
        const participants = [...new Set(weeklyMessages.map(m => m.user))];
        return (
          <div style={{ ...APP, height: "100vh" }}>
            <div style={HDR}>
              <div>
                <div style={LOGO}>✝ Discussion</div>
                <div style={{ color: "#7878a0", fontSize: 12, marginTop: 2 }}>{weekly.book} · Chapter {weekly.chapter}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: "#9898b8", fontSize: 11, marginBottom: 4 }}>Participating</div>
                <div style={{ display: "flex", justifyContent: "flex-end" }}>
                  {participants.slice(0, 5).map((p, i) => <div key={p} style={{ marginLeft: i ? -8 : 0, zIndex: 5 - i }}><Avatar name={p} size={26} /></div>)}
                  {participants.length > 5 && <div style={{ width: 26, height: 26, borderRadius: "50%", background: "#2e2e4a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#9898b8", marginLeft: -8 }}>+{participants.length - 5}</div>}
                  {!participants.length && <span style={{ color: "#46466a", fontSize: 12, fontStyle: "italic" }}>None yet</span>}
                </div>
              </div>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "16px 16px 0", display: "flex", flexDirection: "column", gap: 12 }}>
              {!weeklyMessages.length && (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#46466a", fontStyle: "italic", textAlign: "center", padding: "40px 24px" }}>
                  <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.5 }}>✦</div>
                  <p style={{ margin: 0, fontSize: 16 }}>No thoughts shared yet.<br />Be the first to reflect.</p>
                </div>
              )}
              {weeklyMessages.map(msg => {
                const isMe = msg.user === userName;
                return (
                  <div key={msg.id} style={{ display: "flex", flexDirection: isMe ? "row-reverse" : "row", alignItems: "flex-start", gap: 10 }}>
                    {!isMe && <Avatar name={msg.user} size={34} />}
                    <div style={{ maxWidth: "75%" }}>
                      {!isMe && <div style={{ fontSize: 12, color: "#c9a96e", marginBottom: 3, paddingLeft: 2 }}>{msg.user}</div>}
                      <div style={{ background: isMe ? "linear-gradient(135deg,#c9a96e,#a8854a)" : "rgba(255,255,255,0.06)", border: isMe ? "none" : "1px solid #2e2e4a", borderRadius: isMe ? "16px 16px 4px 16px" : "4px 16px 16px 16px", padding: "10px 14px", color: isMe ? "#f0f0ff" : "#d0d0e8", fontSize: 16, lineHeight: 1.6 }}>{msg.text}</div>
                      <div style={{ fontSize: 11, color: "#46466a", marginTop: 3, textAlign: isMe ? "right" : "left" }}>{formatTime(msg.timestamp)}</div>
                    </div>
                  </div>
                );
              })}
              <div ref={chatEndRef} />
            </div>
            <div style={{ padding: "12px 16px 16px", background: "#13131f", borderTop: "1px solid #2e2e4a", display: "flex", gap: 10 }}>
              <input value={msgInput} onChange={e => setMsgInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendMessage()} placeholder="Share your thoughts..."
                style={{ flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid #2e2e4a", borderRadius: 20, padding: "10px 16px", color: "#e8e8f0", fontSize: 16, outline: "none" }} />
              <button onClick={sendMessage} disabled={!msgInput.trim()} style={{ background: msgInput.trim() ? "linear-gradient(135deg,#c9a96e,#a8854a)" : "#252538", border: "none", borderRadius: "50%", width: 44, height: 44, cursor: msgInput.trim() ? "pointer" : "default", color: "#f0f0ff", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>→</button>
            </div>
            <NavBar cur="chat" />
          </div>
        );
      }

      // ── BROWSE ──────────────────────────────────────────────────────────────
      if (screen === "browse") {
        const books = activeTab === "OT" ? OT_BOOKS : NT_BOOKS;
        return (
          <div style={APP}>
            {showTransPicker && <TransPicker />}
            <div style={HDR}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                {selectedBook && <button onClick={() => setSelectedBook(null)} style={{ background: "none", border: "none", color: "#c9a96e", fontSize: 22, cursor: "pointer", padding: 0 }}>←</button>}
                <div style={LOGO}>✝ {selectedBook || "All Lads"}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <button style={TRANS_BTN} onClick={() => setShowTransPicker(true)}>{translation}</button>
                {!selectedBook && ["OT","NT"].map(t => (
                  <button key={t} onClick={() => setActiveTab(t)} style={{ background: activeTab === t ? "#c9a96e" : "transparent", border: `1px solid ${activeTab === t ? "#c9a96e" : "#3a3a5c"}`, borderRadius: 6, padding: "4px 10px", color: activeTab === t ? "#f0f0ff" : "#7878a0", fontSize: 11, cursor: "pointer" }}>{t}</button>
                ))}
              </div>
            </div>
            <div style={CONTENT}>
              {selectedBook ? (
                <div style={{ padding: "16px 16px 80px" }}>
                  <div style={{ color: "#7878a0", fontSize: 13, marginBottom: 12, paddingLeft: 4 }}>{BIBLE_DATA[selectedBook].chapters} chapters · {TRANSLATIONS.find(t => t.id === translation)?.short}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 8 }}>
                    {Array.from({ length: BIBLE_DATA[selectedBook].chapters }, (_, i) => i + 1).map(ch => {
                      const isWeek = selectedBook === weekly.book && ch === weekly.chapter;
                      return (
                        <button key={ch} onClick={() => { setSelectedChapter(ch); setScreen("read"); }}
                          style={{ background: isWeek ? "linear-gradient(135deg,#c9a96e,#a8854a)" : "rgba(255,255,255,0.04)", border: `1px solid ${isWeek ? "transparent" : "#2e2e4a"}`, borderRadius: 8, padding: "12px 4px", color: isWeek ? "#f0f0ff" : "#9898b8", fontSize: 15, cursor: "pointer", fontWeight: isWeek ? 600 : 400 }}>{ch}</button>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div style={{ padding: "12px 16px 80px" }}>
                  <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#7878a0", padding: "8px 4px 12px" }}>
                    {activeTab === "OT" ? "Old Testament · 39 Books" : "New Testament · 27 Books"}
                  </div>
                  {books.map((book, i) => {
                    const isWeek = book === weekly.book;
                    return (
                      <button key={book} onClick={() => setSelectedBook(book)} style={{ width: "100%", background: isWeek ? "rgba(201,169,110,0.1)" : "rgba(255,255,255,0.03)", border: `1px solid ${isWeek ? "rgba(201,169,110,0.4)" : "#252538"}`, borderRadius: 10, padding: "13px 16px", color: isWeek ? "#c9a96e" : "#b8b8d8", fontSize: 16, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <span style={{ color: "#46466a", fontSize: 12, minWidth: 20 }}>{i + 1}</span>
                          <span>{book}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          {isWeek && <span style={{ background: "#c9a96e", borderRadius: 10, padding: "1px 6px", fontSize: 9, color: "#f0f0ff", letterSpacing: "0.1em", textTransform: "uppercase" }}>This Week</span>}
                          <span style={{ color: "#46466a", fontSize: 13 }}>{BIBLE_DATA[book].chapters} ch</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
            <NavBar cur="browse" />
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BibleApp />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then(reg => {
          console.log("SW registered:", reg.scope);
        }).catch(err => {
          console.log("SW failed:", err);
        });
      });
    }
  </script>
</body>
</html>
