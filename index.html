<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ALBS" />
  <title>All Lads Bible Study</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a1a2e; }
    body { font-family: 'Crimson Pro', Georgia, serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    #root { height: 100%; }
    input, button, textarea { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Supabase ───────────────────────────────────────────────────────────────
    const SUPABASE_URL = "https://wywawxwszpsrocffapaf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5d2F3eHdzenBzcm9jZmZhcGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MzUzNzQsImV4cCI6MjA4ODAxMTM3NH0.Dw0nQC1xYFSv334_XIP2fvYd0TKKMj_hYLHzjHlnnFk";
    async function sbFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal", ...options.headers },
      });
      const text = await res.text();
      if (!res.ok) throw new Error(text);
      return text ? JSON.parse(text) : null;
    }

    // ── localStorage ───────────────────────────────────────────────────────────
    const store = {
      get:    (k)    => { try { const v = localStorage.getItem(k); return v ? {value:v} : null; } catch { return null; } },
      set:    (k, v) => { try { localStorage.setItem(k, v); } catch {} },
      remove: (k)    => { try { localStorage.removeItem(k); } catch {} },
    };

    // ── Translations — all served by bible-api.com (public domain) ─────────────
    // KJV  = King James Version (1611, most famous)
    // WEB  = World English Bible (modern, readable, ~NIV readability)
    // BBE  = Bible in Basic English (simple vocabulary)
    // WEBBE= WEB British Edition (WEB with British spelling)
    const TRANSLATIONS = [
      { id:"kjv",   label:"King James Version",          short:"KJV",   desc:"The classic 1611 translation"         },
      { id:"web",   label:"World English Bible",         short:"WEB",   desc:"Modern readable English"              },
      { id:"bbe",   label:"Bible in Basic English",      short:"BBE",   desc:"Simple, clear language"               },
      { id:"webbe", label:"WEB British Edition",         short:"WEBBE", desc:"Modern English, British spelling"     },
    ];

    // ── bible-api.com book name mapping ────────────────────────────────────────
    // The API uses specific URL-friendly names for some books
    const BOOK_URL = {
      "Song of Solomon": "song+of+solomon",
      "1 Samuel": "1+samuel", "2 Samuel": "2+samuel",
      "1 Kings":  "1+kings",  "2 Kings":  "2+kings",
      "1 Chronicles": "1+chronicles", "2 Chronicles": "2+chronicles",
      "1 Corinthians": "1+corinthians", "2 Corinthians": "2+corinthians",
      "1 Thessalonians": "1+thessalonians", "2 Thessalonians": "2+thessalonians",
      "1 Timothy": "1+timothy", "2 Timothy": "2+timothy",
      "1 Peter": "1+peter", "2 Peter": "2+peter",
      "1 John":  "1+john",  "2 John":  "2+john", "3 John": "3+john",
      "1 Samuel": "1+samuel",
    };
    function bookToUrl(book) {
      return BOOK_URL[book] || book.toLowerCase().replace(/ /g, "+");
    }

    // ── Fetch from bible-api.com ───────────────────────────────────────────────
    async function fetchBibleChapter(book, chapter, translationId) {
      const bookUrl = bookToUrl(book);
      // bible-api.com format: /john+3 or /john+3?translation=web
      const transParam = translationId !== "kjv" ? `?translation=${translationId}` : "";
      const url = `https://bible-api.com/${bookUrl}+${chapter}${transParam}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      // bible-api.com returns { verses: [{book_name, chapter, verse, text}] }
      return data.verses.map(v => ({ verse: v.verse, text: v.text.trim() }));
    }

    // ── Bible data ─────────────────────────────────────────────────────────────
    const BIBLE_DATA = {
      "Genesis":{chapters:50},"Exodus":{chapters:40},"Leviticus":{chapters:27},"Numbers":{chapters:36},"Deuteronomy":{chapters:34},"Joshua":{chapters:24},"Judges":{chapters:21},"Ruth":{chapters:4},"1 Samuel":{chapters:31},"2 Samuel":{chapters:24},"1 Kings":{chapters:22},"2 Kings":{chapters:25},"1 Chronicles":{chapters:29},"2 Chronicles":{chapters:36},"Ezra":{chapters:10},"Nehemiah":{chapters:13},"Esther":{chapters:10},"Job":{chapters:42},"Psalms":{chapters:150},"Proverbs":{chapters:31},"Ecclesiastes":{chapters:12},"Song of Solomon":{chapters:8},"Isaiah":{chapters:66},"Jeremiah":{chapters:52},"Lamentations":{chapters:5},"Ezekiel":{chapters:48},"Daniel":{chapters:12},"Hosea":{chapters:14},"Joel":{chapters:3},"Amos":{chapters:9},"Obadiah":{chapters:1},"Jonah":{chapters:4},"Micah":{chapters:7},"Nahum":{chapters:3},"Habakkuk":{chapters:3},"Zephaniah":{chapters:3},"Haggai":{chapters:2},"Zechariah":{chapters:14},"Malachi":{chapters:4},"Matthew":{chapters:28},"Mark":{chapters:16},"Luke":{chapters:24},"John":{chapters:21},"Acts":{chapters:28},"Romans":{chapters:16},"1 Corinthians":{chapters:16},"2 Corinthians":{chapters:13},"Galatians":{chapters:6},"Ephesians":{chapters:6},"Philippians":{chapters:4},"Colossians":{chapters:4},"1 Thessalonians":{chapters:5},"2 Thessalonians":{chapters:3},"1 Timothy":{chapters:6},"2 Timothy":{chapters:4},"Titus":{chapters:3},"Philemon":{chapters:1},"Hebrews":{chapters:13},"James":{chapters:5},"1 Peter":{chapters:5},"2 Peter":{chapters:3},"1 John":{chapters:5},"2 John":{chapters:1},"3 John":{chapters:1},"Jude":{chapters:1},"Revelation":{chapters:22},
    };
    const OT_BOOKS = Object.keys(BIBLE_DATA).slice(0, 39);
    const NT_BOOKS = Object.keys(BIBLE_DATA).slice(39);

    function getWeeklyChapter() {
      const epoch = new Date("2024-01-07");
      const weekNum = Math.floor((Date.now() - epoch) / (7*24*60*60*1000));
      const all = [];
      for (const [book, d] of Object.entries(BIBLE_DATA))
        for (let c = 1; c <= d.chapters; c++) all.push({ book, chapter: c });
      return all[((weekNum % all.length) + all.length) % all.length];
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    const avatarColors = ["#5b6ea8","#7b8eae","#6e7fba","#8e7bae","#7b9e8e","#9e8b7b","#6b8eae","#ae8b9e","#7b9ea8","#9e9b7b"];
    function getAvatarColor(name) {
      let h = 0; for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h<<5)-h);
      return avatarColors[Math.abs(h) % avatarColors.length];
    }
    function Avatar({ name, size=36 }) {
      const initials = name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
      return <div style={{width:size,height:size,borderRadius:"50%",background:getAvatarColor(name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.38,fontWeight:700,color:"#f0f0ff",flexShrink:0}}>{initials}</div>;
    }
    function formatTime(ts) {
      const diff = Date.now()-ts;
      if (diff<60000) return "just now";
      if (diff<3600000) return `${Math.floor(diff/60000)}m ago`;
      if (diff<86400000) return `${Math.floor(diff/3600000)}h ago`;
      return new Date(ts).toLocaleDateString("en-AU",{day:"numeric",month:"short"});
    }

    // ── Shared styles ──────────────────────────────────────────────────────────
    const APP   = {minHeight:"100vh",background:"#1a1a2e",color:"#e8e8f0",fontFamily:"'Crimson Pro',Georgia,serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"};
    const HDR   = {background:"linear-gradient(180deg,#252538,#1a1a2e)",borderBottom:"1px solid #2e2e4a",padding:"14px 20px 12px",paddingTop:"calc(14px + env(safe-area-inset-top,0px))",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20};
    const LOGO  = {fontSize:17,fontWeight:600,color:"#c9a96e",letterSpacing:"0.06em",textTransform:"uppercase"};
    const NBWRP = {display:"flex",background:"#13131f",borderTop:"1px solid #2e2e4a",position:"sticky",bottom:0,zIndex:20,paddingBottom:"env(safe-area-inset-bottom,0px)"};
    const CONT  = {flex:1,overflowY:"auto",paddingBottom:80};
    const TBTN  = {background:"rgba(201,169,110,0.12)",border:"1px solid #3a3a5c",borderRadius:20,padding:"4px 10px",color:"#c9a96e",fontSize:12,cursor:"pointer",letterSpacing:"0.05em"};
    const NBT   = (a)=>({flex:1,padding:"11px 4px 9px",background:"none",border:"none",color:a?"#c9a96e":"#58587a",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3});
    const GOLD_BTN = {background:"linear-gradient(135deg,#c9a96e,#a8854a)",border:"none",borderRadius:8,padding:"10px 20px",color:"#f0f0ff",fontSize:14,fontWeight:600,cursor:"pointer",letterSpacing:"0.05em"};
    const OUT_BTN  = {background:"rgba(201,169,110,0.15)",border:"1px solid #c9a96e",borderRadius:8,padding:"10px 20px",color:"#c9a96e",fontSize:14,cursor:"pointer"};
    const INP   = {width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid #3a3a5c",borderRadius:10,padding:"12px 16px",color:"#e8e8f0",fontSize:18,outline:"none"};

    // ── App ────────────────────────────────────────────────────────────────────
    function BibleApp() {
      const [screen,      setScreen]      = useState("splash");
      const [userName,    setUserName]    = useState("");
      const [nameInput,   setNameInput]   = useState("");
      const [messages,    setMessages]    = useState([]);
      const [msgInput,    setMsgInput]    = useState("");
      const [selBook,     setSelBook]     = useState(null);
      const [selChapter,  setSelChapter]  = useState(1);
      const [activeTab,   setActiveTab]   = useState("OT");
      const [verses,      setVerses]      = useState([]);
      const [vLoading,    setVLoading]    = useState(false);
      const [vError,      setVError]      = useState("");
      const [translation, setTranslation] = useState("kjv");
      const [showTrans,   setShowTrans]   = useState(false);
      const [showSettings,setShowSettings]= useState(false);
      const chatEnd = useRef(null);
      const weekly = getWeeklyChapter();

      // ── Startup ──────────────────────────────────────────────────────────────
      useEffect(() => {
        const savedName  = store.get("userName");
        const savedTrans = store.get("userTranslation");
        if (savedTrans?.value) setTranslation(savedTrans.value);
        if (savedName?.value) { setUserName(savedName.value); setScreen("home"); }
        else setScreen("login");

        const fetchMsgs = () =>
          sbFetch("messages?select=*&order=timestamp.asc")
            .then(rows => { if (rows) setMessages(rows.map(r=>({id:r.id,user:r.user_name,text:r.text,chapter:r.chapter,timestamp:r.timestamp}))); })
            .catch(()=>{});
        fetchMsgs();
        const poll = setInterval(fetchMsgs, 6000);
        return () => clearInterval(poll);
      }, []);

      useEffect(() => { chatEnd.current?.scrollIntoView({behavior:"smooth"}); }, [messages, screen]);

      useEffect(() => {
        if (screen === "read") {
          const book    = selBook || weekly.book;
          const chapter = selBook ? selChapter : weekly.chapter;
          loadChapter(book, chapter, translation);
        }
      }, [screen, selBook, selChapter]);

      // ── Load chapter from bible-api.com ──────────────────────────────────────
      async function loadChapter(book, chapter, trans) {
        const t = trans || translation;
        setVLoading(true); setVError(""); setVerses([]);

        // Check cache first
        const cacheKey = `ch:${t}:${book}:${chapter}`;
        const cached = store.get(cacheKey);
        if (cached) {
          try {
            const p = JSON.parse(cached.value);
            if (Array.isArray(p) && p.length > 0) { setVerses(p); setVLoading(false); return; }
          } catch {}
        }

        try {
          const verses = await fetchBibleChapter(book, chapter, t);
          setVerses(verses);
          store.set(cacheKey, JSON.stringify(verses));
        } catch (e) {
          setVError("Could not load chapter. Check your internet connection and try again.");
        }
        setVLoading(false);
      }

      function changeTranslation(t) {
        setTranslation(t); setShowTrans(false);
        store.set("userTranslation", t);
        if (screen === "read") {
          loadChapter(selBook||weekly.book, selBook?selChapter:weekly.chapter, t);
        }
      }

      function handleLogin() {
        const name = nameInput.trim();
        if (!name) return;
        setUserName(name); store.set("userName", name);
        sbFetch("members",{method:"POST",headers:{"Prefer":"resolution=ignore-duplicates,return=minimal"},body:JSON.stringify({name})}).catch(()=>{});
        setScreen("home");
      }

      function sendMessage() {
        const text = msgInput.trim();
        if (!text) return;
        const ts = Date.now();
        const chapter = `${weekly.book} ${weekly.chapter}`;
        setMessages(prev=>[...prev,{id:ts,user:userName,text,chapter,timestamp:ts}]);
        setMsgInput("");
        sbFetch("messages",{method:"POST",body:JSON.stringify({user_name:userName,text,chapter,timestamp:ts})}).catch(()=>{});
      }

      const weeklyMsgs = messages.filter(m=>m.chapter===`${weekly.book} ${weekly.chapter}`);

      // ── Sub-components ────────────────────────────────────────────────────────
      const NavBar = ({cur}) => (
        <nav style={NBWRP}>
          {[{id:"home",icon:"⌂",label:"Home"},{id:"read",icon:"✦",label:"This Week"},{id:"chat",icon:"◈",label:weeklyMsgs.length>0?`Chat (${weeklyMsgs.length})`:"Chat"},{id:"browse",icon:"◎",label:"Browse"}]
            .map(({id,icon,label})=>(
              <button key={id} style={NBT(cur===id)} onClick={()=>{if(id!=="read")setSelBook(null);setScreen(id);}}>
                <span style={{fontSize:18}}>{icon}</span><span>{label}</span>
              </button>
            ))}
        </nav>
      );

      const TransPicker = () => (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowTrans(false)}>
          <div style={{background:"#1e1e30",border:"1px solid #2e2e4a",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,paddingBottom:32}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",padding:"16px 0 12px"}}>
              <div style={{width:36,height:4,background:"#2e2e4a",borderRadius:2,margin:"0 auto 14px"}}/>
              <div style={{color:"#7878a0",fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase"}}>Choose Translation</div>
            </div>
            {TRANSLATIONS.map(t=>(
              <button key={t.id} onClick={()=>changeTranslation(t.id)}
                style={{width:"100%",background:translation===t.id?"rgba(201,169,110,0.1)":"none",border:"none",borderLeft:`3px solid ${translation===t.id?"#c9a96e":"transparent"}`,padding:"14px 24px",color:translation===t.id?"#c9a96e":"#b8b8d8",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:16}}>{t.label}</div>
                  <div style={{fontSize:12,color:translation===t.id?"rgba(201,169,110,0.7)":"#58587a",marginTop:2}}>{t.desc}</div>
                </div>
                <span style={{fontSize:13,color:translation===t.id?"#c9a96e":"#46466a",letterSpacing:"0.08em",fontWeight:600,marginLeft:12,flexShrink:0}}>{t.short}</span>
              </button>
            ))}
            <div style={{margin:"12px 24px 0",padding:"12px",background:"rgba(255,255,255,0.03)",borderRadius:10,border:"1px solid #2e2e4a"}}>
              <div style={{fontSize:12,color:"#58587a",lineHeight:1.6}}>
                ℹ All translations are public domain and served via <span style={{color:"#7878a0"}}>bible-api.com</span>. Chapters are cached after first load.
              </div>
            </div>
          </div>
        </div>
      );

      const Settings = () => {
        function logout() { store.remove("userName"); setUserName(""); setShowSettings(false); setScreen("login"); }
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowSettings(false)}>
            <div style={{background:"#1e1e30",border:"1px solid #2e2e4a",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,padding:"20px 24px 48px"}} onClick={e=>e.stopPropagation()}>
              <div style={{width:36,height:4,background:"#2e2e4a",borderRadius:2,margin:"0 auto 20px"}}/>
              <div style={{color:"#c9a96e",fontSize:16,fontWeight:600,marginBottom:6}}>Signed in as</div>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24,padding:"12px",background:"rgba(255,255,255,0.04)",borderRadius:12,border:"1px solid #2e2e4a"}}>
                <Avatar name={userName} size={40}/>
                <span style={{fontSize:18,color:"#e8e8f0"}}>{userName}</span>
              </div>
              <button onClick={logout} style={{width:"100%",background:"none",border:"1px solid #8b6e7a",borderRadius:10,padding:13,color:"#8b6e7a",fontSize:15,cursor:"pointer"}}>Change Name / Log Out</button>
            </div>
          </div>
        );
      };

      // ── SPLASH ────────────────────────────────────────────────────────────────
      if (screen==="splash") return (
        <div style={{minHeight:"100vh",background:"#1a1a2e",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:40,color:"#c9a96e",marginBottom:12}}>✝</div>
          <div style={{color:"#58587a",fontSize:16,fontStyle:"italic"}}>All Lads Bible Study</div>
        </div>
      );

      // ── LOGIN ─────────────────────────────────────────────────────────────────
      if (screen==="login") return (
        <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#1a1a2e,#0d0d1a 50%,#1a1a2e)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
          <div style={{fontSize:48,marginBottom:8,color:"#c9a96e",opacity:0.8}}>✝</div>
          <h1 style={{fontSize:27,fontWeight:400,color:"#e8e8f0",margin:"0 0 6px",letterSpacing:"0.1em",textTransform:"uppercase",textAlign:"center"}}>All Lads Bible Study</h1>
          <p style={{color:"#7878a0",fontSize:15,margin:"0 0 40px",fontStyle:"italic"}}>A community Bible study</p>
          <div style={{width:"100%",maxWidth:340,background:"rgba(255,255,255,0.04)",border:"1px solid #2e2e4a",borderRadius:16,padding:28}}>
            <p style={{color:"#9898b8",fontSize:13,letterSpacing:"0.06em",textTransform:"uppercase",margin:"0 0 8px"}}>Your Name</p>
            <input value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Enter your name..." autoFocus style={{...INP,marginBottom:20}}/>
            <button onClick={handleLogin} style={{width:"100%",...GOLD_BTN,padding:13,borderRadius:10,textTransform:"uppercase",letterSpacing:"0.08em",fontSize:16,fontWeight:600}}>Enter the Study</button>
          </div>
          <p style={{color:"#46466a",fontSize:13,marginTop:24,fontStyle:"italic",textAlign:"center"}}>
            "Your word is a lamp to my feet and a light to my path."<br/><span style={{color:"#58587a"}}>— Psalm 119:105</span>
          </p>
        </div>
      );

      // ── HOME ──────────────────────────────────────────────────────────────────
      if (screen==="home") return (
        <div style={APP}>
          {showTrans && <TransPicker/>}{showSettings && <Settings/>}
          <div style={HDR}>
            <div style={LOGO}>✝ All Lads</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button style={TBTN} onClick={()=>setShowTrans(true)}>{TRANSLATIONS.find(t=>t.id===translation)?.short || translation.toUpperCase()}</button>
              <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:8}}>
                <Avatar name={userName} size={30}/>
                <span style={{color:"#9898b8",fontSize:14}}>{userName}</span>
              </button>
            </div>
          </div>
          <div style={CONT}>
            <div style={{background:"linear-gradient(180deg,#252538,#1a1a2e)",padding:"28px 24px 24px",borderBottom:"1px solid #2e2e4a"}}>
              <div style={{fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",color:"#7878a0",marginBottom:8}}>This Week's Study</div>
              <h1 style={{fontSize:30,fontWeight:600,color:"#e8e8f0",margin:"0 0 2px"}}>{weekly.book}</h1>
              <div style={{fontSize:18,color:"#c9a96e",marginBottom:16}}>Chapter {weekly.chapter}</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setSelBook(null);setScreen("read");}} style={GOLD_BTN}>Read Now</button>
                <button onClick={()=>setScreen("chat")} style={OUT_BTN}>Discuss ({weeklyMsgs.length})</button>
              </div>
            </div>

            <div style={{padding:"24px 24px 0"}}>
              <div style={{fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",color:"#7878a0",marginBottom:16}}>Recent Thoughts</div>
              {weeklyMsgs.length===0
                ? <div style={{background:"rgba(255,255,255,0.03)",border:"1px dashed #2e2e4a",borderRadius:12,padding:24,textAlign:"center",color:"#46466a",fontStyle:"italic"}}>Be the first to share your thoughts on {weekly.book} {weekly.chapter}</div>
                : <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {weeklyMsgs.slice(-3).reverse().map(msg=>(
                      <div key={msg.id} style={{background:"rgba(255,255,255,0.04)",border:"1px solid #2e2e4a",borderRadius:12,padding:"14px 16px",display:"flex",gap:12}}>
                        <Avatar name={msg.user} size={34}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4}}>
                            <span style={{color:"#c9a96e",fontSize:14,fontWeight:600}}>{msg.user}</span>
                            <span style={{color:"#46466a",fontSize:12}}>{formatTime(msg.timestamp)}</span>
                          </div>
                          <p style={{margin:0,color:"#b8b8d8",fontSize:15,lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{msg.text}</p>
                        </div>
                      </div>
                    ))}
                    {weeklyMsgs.length>3 && <button onClick={()=>setScreen("chat")} style={{background:"none",border:"none",color:"#c9a96e",fontSize:14,cursor:"pointer",fontStyle:"italic",padding:0,textAlign:"left"}}>View all {weeklyMsgs.length} thoughts →</button>}
                  </div>
              }
            </div>
            <div style={{padding:24}}>
              <div style={{fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",color:"#7878a0",marginBottom:12}}>The Full Bible</div>
              <button onClick={()=>setScreen("browse")} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid #2e2e4a",borderRadius:12,padding:16,color:"#9898b8",fontSize:15,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>66 Books · Old & New Testament</span><span style={{color:"#c9a96e"}}>Browse →</span>
              </button>
            </div>
          </div>
          <NavBar cur="home"/>
        </div>
      );

      // ── READ ──────────────────────────────────────────────────────────────────
      if (screen==="read") {
        const displayBook    = selBook || weekly.book;
        const displayChapter = selBook ? selChapter : weekly.chapter;
        const isWeekly       = displayBook===weekly.book && displayChapter===weekly.chapter;
        const trans          = TRANSLATIONS.find(t=>t.id===translation);
        return (
          <div style={APP}>
            {showTrans && <TransPicker/>}
            <div style={{...HDR,flexDirection:"column",alignItems:"stretch",gap:6}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <button onClick={()=>setScreen("browse")} style={{background:"none",border:"none",color:"#c9a96e",fontSize:22,cursor:"pointer",padding:0}}>←</button>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {isWeekly && <div style={{background:"rgba(201,169,110,0.15)",border:"1px solid #c9a96e",borderRadius:20,padding:"3px 10px",fontSize:10,color:"#c9a96e",letterSpacing:"0.1em",textTransform:"uppercase"}}>This Week</div>}
                  <button style={TBTN} onClick={()=>setShowTrans(true)}>{trans?.short || translation.toUpperCase()}</button>
                </div>
              </div>
              <div>
                <span style={{color:"#e8e8f0",fontSize:18,fontWeight:600}}>{displayBook}</span>
                <span style={{color:"#7878a0",fontSize:14}}> · Chapter {displayChapter}</span>
                <span style={{color:"#46466a",fontSize:12,marginLeft:6}}>{trans?.label}</span>
              </div>
            </div>

            <div style={{...CONT,padding:"24px 24px 100px"}}>
              {vLoading && (
                <div style={{textAlign:"center",padding:"60px 0",color:"#58587a"}}>
                  <div style={{fontSize:28,marginBottom:12,animation:"none"}}>✝</div>
                  <p style={{fontStyle:"italic",fontSize:16,margin:"0 0 4px"}}>Loading scripture...</p>
                  <p style={{fontSize:13,color:"#35354f",margin:0}}>{trans?.label}</p>
                </div>
              )}
              {vError && (
                <div style={{textAlign:"center",padding:"60px 24px"}}>
                  <div style={{fontSize:28,color:"#4a3a5a",marginBottom:16}}>⚠</div>
                  <p style={{fontSize:16,color:"#8b6e7a",marginBottom:20,lineHeight:1.6}}>{vError}</p>
                  <button onClick={()=>loadChapter(displayBook,displayChapter,translation)} style={{...GOLD_BTN}}>Try Again</button>
                </div>
              )}
              {!vLoading && !vError && verses.map(v=>(
                <div key={v.verse} style={{display:"flex",gap:16,marginBottom:20}}>
                  <span style={{color:"#c9a96e",fontSize:11,fontWeight:700,minWidth:22,paddingTop:5,flexShrink:0,letterSpacing:"0.05em"}}>{v.verse}</span>
                  <p style={{margin:0,color:"#e8e8f0",fontSize:19,lineHeight:1.9,fontWeight:300}}>{v.text}</p>
                </div>
              ))}
              {isWeekly && !vLoading && !vError && verses.length>0 && (
                <div style={{marginTop:32,padding:20,background:"rgba(201,169,110,0.08)",border:"1px solid rgba(201,169,110,0.3)",borderRadius:12,textAlign:"center"}}>
                  <p style={{margin:"0 0 12px",color:"#9898b8",fontStyle:"italic",fontSize:15}}>Share your thoughts on this chapter</p>
                  <button onClick={()=>setScreen("chat")} style={GOLD_BTN}>Join the Discussion</button>
                </div>
              )}
            </div>
            <NavBar cur="read"/>
          </div>
        );
      }

      // ── CHAT ──────────────────────────────────────────────────────────────────
      if (screen==="chat") {
        const participants = [...new Set(weeklyMsgs.map(m=>m.user))];
        return (
          <div style={{...APP,height:"100vh"}}>
            <div style={HDR}>
              <div>
                <div style={LOGO}>✝ Discussion</div>
                <div style={{color:"#7878a0",fontSize:12,marginTop:2}}>{weekly.book} · Chapter {weekly.chapter}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:"#9898b8",fontSize:11,marginBottom:4}}>Participating</div>
                <div style={{display:"flex",justifyContent:"flex-end"}}>
                  {participants.slice(0,5).map((p,i)=><div key={p} style={{marginLeft:i?-8:0,zIndex:5-i}}><Avatar name={p} size={26}/></div>)}
                  {participants.length>5 && <div style={{width:26,height:26,borderRadius:"50%",background:"#2e2e4a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#9898b8",marginLeft:-8}}>+{participants.length-5}</div>}
                  {!participants.length && <span style={{color:"#46466a",fontSize:12,fontStyle:"italic"}}>None yet</span>}
                </div>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"16px 16px 0",display:"flex",flexDirection:"column",gap:12}}>
              {!weeklyMsgs.length && (
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#46466a",fontStyle:"italic",textAlign:"center",padding:"40px 24px"}}>
                  <div style={{fontSize:32,marginBottom:12,opacity:0.5}}>✦</div>
                  <p style={{margin:0,fontSize:16}}>No thoughts shared yet.<br/>Be the first to reflect.</p>
                </div>
              )}
              {weeklyMsgs.map(msg=>{
                const isMe=msg.user===userName;
                return (
                  <div key={msg.id} style={{display:"flex",flexDirection:isMe?"row-reverse":"row",alignItems:"flex-start",gap:10}}>
                    {!isMe && <Avatar name={msg.user} size={34}/>}
                    <div style={{maxWidth:"75%"}}>
                      {!isMe && <div style={{fontSize:12,color:"#c9a96e",marginBottom:3,paddingLeft:2}}>{msg.user}</div>}
                      <div style={{background:isMe?"linear-gradient(135deg,#c9a96e,#a8854a)":"rgba(255,255,255,0.06)",border:isMe?"none":"1px solid #2e2e4a",borderRadius:isMe?"16px 16px 4px 16px":"4px 16px 16px 16px",padding:"10px 14px",color:isMe?"#f0f0ff":"#d0d0e8",fontSize:16,lineHeight:1.6}}>{msg.text}</div>
                      <div style={{fontSize:11,color:"#46466a",marginTop:3,textAlign:isMe?"right":"left"}}>{formatTime(msg.timestamp)}</div>
                    </div>
                  </div>
                );
              })}
              <div ref={chatEnd}/>
            </div>
            <div style={{padding:"12px 16px 16px",background:"#13131f",borderTop:"1px solid #2e2e4a",display:"flex",gap:10}}>
              <input value={msgInput} onChange={e=>setMsgInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage()} placeholder="Share your thoughts..."
                style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid #2e2e4a",borderRadius:20,padding:"10px 16px",color:"#e8e8f0",fontSize:16,outline:"none"}}/>
              <button onClick={sendMessage} disabled={!msgInput.trim()} style={{background:msgInput.trim()?"linear-gradient(135deg,#c9a96e,#a8854a)":"#252538",border:"none",borderRadius:"50%",width:44,height:44,cursor:msgInput.trim()?"pointer":"default",color:"#f0f0ff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>→</button>
            </div>
            <NavBar cur="chat"/>
          </div>
        );
      }

      // ── BROWSE ────────────────────────────────────────────────────────────────
      if (screen==="browse") {
        const books = activeTab==="OT" ? OT_BOOKS : NT_BOOKS;
        return (
          <div style={APP}>
            {showTrans && <TransPicker/>}
            <div style={HDR}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {selBook && <button onClick={()=>setSelBook(null)} style={{background:"none",border:"none",color:"#c9a96e",fontSize:22,cursor:"pointer",padding:0}}>←</button>}
                <div style={LOGO}>✝ {selBook || "All Lads"}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button style={TBTN} onClick={()=>setShowTrans(true)}>{TRANSLATIONS.find(t=>t.id===translation)?.short || translation.toUpperCase()}</button>
                {!selBook && ["OT","NT"].map(t=>(
                  <button key={t} onClick={()=>setActiveTab(t)} style={{background:activeTab===t?"#c9a96e":"transparent",border:`1px solid ${activeTab===t?"#c9a96e":"#3a3a5c"}`,borderRadius:6,padding:"4px 10px",color:activeTab===t?"#f0f0ff":"#7878a0",fontSize:11,cursor:"pointer"}}>{t}</button>
                ))}
              </div>
            </div>
            <div style={CONT}>
              {selBook ? (
                <div style={{padding:"16px 16px 80px"}}>
                  <div style={{color:"#7878a0",fontSize:13,marginBottom:12,paddingLeft:4}}>{BIBLE_DATA[selBook].chapters} chapters · {TRANSLATIONS.find(t=>t.id===translation)?.short}</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
                    {Array.from({length:BIBLE_DATA[selBook].chapters},(_,i)=>i+1).map(ch=>{
                      const isW = selBook===weekly.book && ch===weekly.chapter;
                      return <button key={ch} onClick={()=>{setSelChapter(ch);setScreen("read");}} style={{background:isW?"linear-gradient(135deg,#c9a96e,#a8854a)":"rgba(255,255,255,0.04)",border:`1px solid ${isW?"transparent":"#2e2e4a"}`,borderRadius:8,padding:"12px 4px",color:isW?"#f0f0ff":"#9898b8",fontSize:15,cursor:"pointer",fontWeight:isW?600:400}}>{ch}</button>;
                    })}
                  </div>
                </div>
              ) : (
                <div style={{padding:"12px 16px 80px"}}>
                  <div style={{fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",color:"#7878a0",padding:"8px 4px 12px"}}>{activeTab==="OT"?"Old Testament · 39 Books":"New Testament · 27 Books"}</div>
                  {books.map((book,i)=>{
                    const isW=book===weekly.book;
                    return (
                      <button key={book} onClick={()=>setSelBook(book)} style={{width:"100%",background:isW?"rgba(201,169,110,0.1)":"rgba(255,255,255,0.03)",border:`1px solid ${isW?"rgba(201,169,110,0.4)":"#252538"}`,borderRadius:10,padding:"13px 16px",color:isW?"#c9a96e":"#b8b8d8",fontSize:16,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <span style={{color:"#46466a",fontSize:12,minWidth:20}}>{i+1}</span>
                          <span>{book}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          {isW && <span style={{background:"#c9a96e",borderRadius:10,padding:"1px 6px",fontSize:9,color:"#f0f0ff",letterSpacing:"0.1em",textTransform:"uppercase"}}>This Week</span>}
                          <span style={{color:"#46466a",fontSize:13}}>{BIBLE_DATA[book].chapters} ch</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
            <NavBar cur="browse"/>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BibleApp/>);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(()=>{}));
    }
  </script>
</body>
</html>
